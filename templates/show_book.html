<!DOCTYPE html>
<html>

<head>
  <title>{{ book.title }}</title>
</head>

<body>
  <h1>{{ book.title }}</h1>
  {% if session.user_id  == book.user_id %}
  <p>
    <a href="/edit_book/{{ book.id }}">Muokkaa</a>
    <a href="/remove_book/{{ book.id }}">Poista</a>
  {% endif %}
  <p>
    Kirjailija: {{ book.author }}
  </p>
  <p>
    Käyttäjältä: <a href="/user/{{ book.user_id }}">{{ book.username }}</a>
  </p>
  <p>
    <a href="/">Palaa etusivulle</a>
  </p>
</body>

</html>
